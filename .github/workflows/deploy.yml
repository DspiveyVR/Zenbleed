# .github/workflows/deploy.yml
name: Deploy Doxygen Docs to GitHub Pages

on:
  # Runs on pushes to the main branch
  push:
    branches:
      - main 
      # Or whatever your primary branch is (e.g., master)
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions required by the GitHub Pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. Build Doxygen Docs
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Run Doxygen to generate HTML
      - name: Generate Doxygen Documentation
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
          doxygen Doxyfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload the generated HTML artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'doc/' 

  # 2. Deploy the Artifact
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4